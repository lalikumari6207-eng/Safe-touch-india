<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyzonix Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --primary: #00d4ff;
    --secondary: #0a0f1e;
    --accent: #ff6b35;
    --dark: #050810;
    --card-bg: #0d1526;
    --text: #e0e8ff;
    --muted: #7a8ab0;
    --glow: 0 0 20px rgba(0,212,255,0.4);
    --border: rgba(0,212,255,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ===== SPLASH SCREEN ===== */
  #splash {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: splashFade 0.8s ease 4.5s forwards;
  }

  @keyframes splashFade {
    to { opacity: 0; pointer-events: none; }
  }

  .splash-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: splashEnter 0.8s ease forwards;
  }

  @keyframes splashEnter {
    from { opacity:0; transform: scale(0.7) translateY(30px); }
    to { opacity:1; transform: scale(1) translateY(0); }
  }

  .logo-hex {
    width: 160px;
    height: 160px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-hex svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    animation: rotateSlow 6s linear infinite;
  }

  @keyframes rotateSlow {
    to { transform: rotate(360deg); }
  }

  .logo-inner {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--primary);
    text-shadow: var(--glow);
    z-index: 1;
    letter-spacing: 2px;
  }

  .splash-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    color: white;
    text-shadow: 0 0 30px rgba(0,212,255,0.6);
  }

  .splash-title span { color: var(--primary); }

  .splash-sub {
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .splash-bar {
    width: 200px;
    height: 2px;
    background: rgba(0,212,255,0.2);
    margin-top: 20px;
    border-radius: 2px;
    overflow: hidden;
  }

  .splash-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    animation: fillBar 4s ease forwards;
  }

  @keyframes fillBar {
    from { width: 0; }
    to { width: 100%; }
  }

  /* ===== MAIN CONTENT ===== */
  #main-content {
    opacity: 0;
    animation: contentReveal 0.8s ease 5.2s forwards;
  }

  @keyframes contentReveal {
    to { opacity: 1; }
  }

  /* ===== NAVBAR ===== */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    padding: 0 5%;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(5,8,16,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }

  .nav-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: white;
    text-decoration: none;
    letter-spacing: 2px;
  }

  .nav-logo span { color: var(--primary); }

  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 5px;
    z-index: 1100;
  }

  .hamburger span {
    display: block;
    width: 26px;
    height: 2px;
    background: var(--primary);
    border-radius: 2px;
    transition: all 0.3s;
  }

  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

  .nav-menu {
    position: fixed;
    top: 0;
    right: -100%;
    width: min(320px, 85vw);
    height: 100vh;
    background: rgba(10,15,30,0.98);
    backdrop-filter: blur(30px);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 90px 30px 40px;
    gap: 8px;
    transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
    z-index: 1050;
  }

  .nav-menu.open { right: 0; }

  .nav-menu a {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    padding: 12px 16px;
    border-radius: 8px;
    letter-spacing: 1px;
    transition: all 0.3s;
    border: 1px solid transparent;
    text-transform: uppercase;
  }

  .nav-menu a:hover {
    background: rgba(0,212,255,0.1);
    border-color: var(--border);
    color: var(--primary);
    padding-left: 24px;
  }

  .nav-menu .dropdown-label {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s;
    border: 1px solid transparent;
  }

  .nav-menu .dropdown-label:hover {
    background: rgba(0,212,255,0.1);
    border-color: var(--border);
    color: var(--primary);
  }

  .dropdown-arrow { transition: transform 0.3s; font-size: 12px; }
  .dropdown-label.open .dropdown-arrow { transform: rotate(180deg); }

  .sub-menu {
    display: none;
    flex-direction: column;
    gap: 4px;
    padding: 4px 0 4px 16px;
    border-left: 2px solid rgba(0,212,255,0.3);
    margin-left: 16px;
  }

  .sub-menu.open { display: flex; }

  .sub-menu a {
    font-size: 15px;
    color: var(--muted);
    padding: 8px 12px;
  }

  .sub-menu a:hover { color: var(--primary); padding-left: 18px; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1040;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  /* ===== SECTIONS BASE ===== */
  section {
    display: none;
    min-height: 100vh;
    padding: 90px 5% 60px;
  }

  section.active { display: block; }

  /* ===== HERO / HOME ===== */
  #home { padding-top: 0; }

  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 120px 5% 60px;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 60% at 70% 50%, rgba(0,212,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,107,53,0.06) 0%, transparent 60%),
      linear-gradient(180deg, #050810 0%, #0a0f1e 100%);
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 700px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    color: var(--primary);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .hero-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--primary);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.5); }
  }

  .hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -1px;
  }

  .hero h1 .line1 { color: white; }
  .hero h1 .line2 {
    color: var(--primary);
    text-shadow: 0 0 40px rgba(0,212,255,0.5);
  }

  .hero p {
    font-size: 18px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 36px;
    max-width: 540px;
    font-weight: 400;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .btn-primary {
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--primary), #0099cc);
    color: var(--dark);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,212,255,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,212,255,0.5);
  }

  .btn-outline {
    padding: 14px 32px;
    background: transparent;
    color: var(--primary);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid rgba(0,212,255,0.4);
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
  }

  .btn-outline:hover {
    background: rgba(0,212,255,0.1);
    border-color: var(--primary);
  }

  /* ===== STATS ===== */
  .stats-section {
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 50px 5%;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 40px;
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
  }

  .stat-item {}

  .stat-number {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 900;
    color: var(--primary);
    text-shadow: var(--glow);
    display: block;
  }

  .stat-label {
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ===== SERVICES SECTION ===== */
  .section-header {
    text-align: center;
    margin-bottom: 60px;
  }

  .section-tag {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--primary);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 700;
    color: white;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }

  .section-desc {
    font-size: 17px;
    color: var(--muted);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    padding: 60px 5%;
  }

  .service-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 28px;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .service-card:hover {
    border-color: rgba(0,212,255,0.4);
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(0,212,255,0.1);
  }

  .service-card:hover::before { opacity: 1; }

  .service-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.05));
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--primary);
    margin-bottom: 20px;
  }

  .service-card h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: white;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .service-card p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
  }

  .service-tag {
    display: inline-block;
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--primary);
    background: rgba(0,212,255,0.08);
    padding: 4px 10px;
    border-radius: 4px;
  }

  /* ===== CONTACT FORM ===== */
  .contact-wrapper {
    max-width: 700px;
    margin: 0 auto;
    padding: 60px 5%;
  }

  .contact-form {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .form-group label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    background: rgba(0,212,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    outline: none;
    transition: all 0.3s;
    width: 100%;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: rgba(0,212,255,0.5);
    background: rgba(0,212,255,0.08);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }

  .form-group textarea {
    resize: vertical;
    min-height: 120px;
  }

  .form-group select option { background: var(--card-bg); }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), #0099cc);
    color: var(--dark);
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,212,255,0.5);
  }

  .form-success {
    display: none;
    text-align: center;
    padding: 40px;
  }

  .form-success .check-icon {
    width: 70px;
    height: 70px;
    background: rgba(0,212,255,0.1);
    border: 2px solid var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--primary);
    margin: 0 auto 20px;
    animation: popIn 0.4s ease;
  }

  @keyframes popIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  /* ===== ABOUT ===== */
  .about-hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    padding: 40px 0 60px;
  }

  @media (max-width: 768px) {
    .about-hero { grid-template-columns: 1fr; }
  }

  .about-visual {
    position: relative;
  }

  .about-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .about-box::before {
    content: 'LX';
    position: absolute;
    right: -20px;
    top: -20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 120px;
    font-weight: 900;
    color: rgba(0,212,255,0.05);
    line-height: 1;
  }

  .about-box h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--primary);
    text-shadow: var(--glow);
    margin-bottom: 10px;
  }

  .about-box p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
  }

  .values-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 24px;
  }

  .value-item {
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text);
    font-weight: 600;
  }

  .value-item i { color: var(--primary); font-size: 18px; }

  /* ===== OUR STORY ===== */
  .story-timeline {
    max-width: 800px;
    margin: 0 auto;
    position: relative;
    padding: 20px 0;
  }

  .story-timeline::before {
    content: '';
    position: absolute;
    left: 30px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--primary), transparent);
  }

  .story-item {
    display: flex;
    gap: 30px;
    margin-bottom: 50px;
    padding-left: 80px;
    position: relative;
  }

  .story-dot {
    position: absolute;
    left: 22px;
    top: 6px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 15px rgba(0,212,255,0.6);
  }

  .story-year {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--primary);
    min-width: 70px;
    margin-top: 2px;
  }

  .story-content h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .story-content p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* ===== TEAM ===== */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 28px;
    padding: 20px 0;
  }

  .team-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.4s;
  }

  .team-card:hover {
    border-color: rgba(0,212,255,0.4);
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .team-avatar {
    height: 220px;
    background: linear-gradient(135deg, #0d1526, #0a1930);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .team-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .team-avatar-placeholder {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.05));
    border: 2px solid rgba(0,212,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--primary);
  }

  .team-info {
    padding: 24px;
  }

  .team-info h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: white;
    margin-bottom: 6px;
  }

  .team-role {
    font-size: 13px;
    color: var(--primary);
    letter-spacing: 1px;
    text-transform: uppercase;
